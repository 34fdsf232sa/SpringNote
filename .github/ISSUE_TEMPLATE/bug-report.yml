name: "🐛 Bug Report / 报告 Bug"
title: "[Bug]"
description: Report a reproducible problem in SpringNote. / 报告 SpringNote 中可复现的问题。
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SpringNote. Please provide enough context for us to reproduce and diagnose the issue. Issues without clear reproduction steps or logs may be closed. / 感谢你帮助改进 SpringNote。请提供足够的信息，方便我们复现和定位问题。缺少复现步骤或日志的问题可能会被关闭。

  - type: textarea
    attributes:
      label: What happened? / 发生了什么？
      description: Describe the problem clearly, including the actual behavior and what you expected instead. / 请清楚描述问题，包括实际表现和你期望的表现。
      placeholder: |
        Example: After clicking "Generate Weekly Report", the report page still shows old content until I switch to another note and back.
        示例：点击“生成周报”后，页面仍显示旧内容，只有切换到其他便签再切回来才刷新。
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce / 如何复现？
      description: List the exact steps needed to reproduce the issue. / 请列出复现该问题的具体步骤。
      placeholder: |
        1. Open SpringNote
        2. Go to ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment / 环境信息
      description: Provide app version, OS, install method, and relevant AI provider/model settings. Do not paste your API key. / 请提供应用版本、系统、安装方式，以及相关 AI 提供商/模型配置。不要粘贴 API Key。
      placeholder: |
        SpringNote version: 1.0.0
        OS: Windows 11 23H2
        Install method: GitHub Release / Built from source
        AI provider: DeepSeek
        Base URL: https://api.deepseek.com/beta
        Model: deepseek-v4-flash
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Affected area / 受影响模块
      description: Which part of SpringNote is affected? / 问题主要出现在哪个模块？
      multiple: true
      options:
        - "Home / 首页"
        - "Notes / 便签"
        - "Memory Book / 回忆书"
        - "Settings / 设置"
        - "Statistics / 统计"
        - "Desktop Widget / 桌面组件"
        - "AI Provider / AI 提供商"
        - "Windows Build / Windows 构建"
        - "Other / 其他"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs, screenshots, or recordings / 日志、截图或录屏
      description: Paste logs, error messages, screenshots, or recordings. If logs contain private data or API keys, remove them first. / 请粘贴日志、错误信息、截图或录屏。如果日志中包含隐私信息或 API Key，请先删除。
      placeholder: |
        Paste logs here, or drag screenshots/recordings into this field.
        请在这里粘贴日志，或拖入截图/录屏。
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Contribution / 贡献意愿
      description: This is optional. / 这不是必需项。
      options:
        - label: I am willing to submit a PR to fix this issue. / 我愿意提交 PR 修复这个问题。

  - type: checkboxes
    attributes:
      label: Code of Conduct / 行为准则
      options:
        - label: I have read and agree to follow the project's Code of Conduct. / 我已阅读并同意遵守项目行为准则。
          required: true

  - type: markdown
    attributes:
      value: "Thanks for reporting this issue! / 感谢你的反馈！"
